include-file = ~/.config/polybar/current-theme.ini
include-file = ~/.config/polybar/modules.ini

[settings]
screenchange-reload = true
enable-ipc = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over



[global/wm]
margin-top = ${wm.margin-top}
margin-bottom = ${wm.margin-bottom}

[bar/top]
enable-ipc = true
monitor = ${env:MONITOR:}
width = 100%
height = ${bar-top.height}
offset-x = 0%
offset-y = 0
radius = ${bar-top.radius}
fixed-center = true
bottom = false

background = ${bar-top.background}
foreground = ${bar-top.foreground}

line-size = ${bar-top.line-size}
line-color = ${bar-top.line-color}

border-size = 0
border-top-size = ${bar-top.gap-size}
border-left-size = ${bar-top.gap-size}
border-right-size = ${bar-top.gap-size}
border-bottom-size = 0
border-color = #00000000
border-top-color = #00000000

padding-left = ${bar-top.padding-left}
padding-right = ${bar-top.padding-right}

module-margin-left = ${bar-top.module-margin-left}
module-margin-right = ${bar-top.module-margin-right}

font-0 = ${fonts-top.font-0}
font-1 = ${fonts-top.font-1}
font-2 = ${fonts-top.font-2}
font-3 = ${fonts-top.font-3}
font-4 = ${fonts-top.font-4}
font-5 = ${fonts-top.font-5}

modules-left = i3 xwindow
modules-center = date
modules-right = updates-pacman-aurhelper filesystem pulseaudio temperature cpu memory tray-toggle tray
; modules-right = filesystem pulseaudio mpd temperature cpu memory tray-toggle tray

; wm-restack = bspwm
wm-restack = i3

; override-redirect = true

;scroll-up = bspwm-desknext
;scroll-down = bspwm-deskprev

;scroll-up = i3wm-wsnext
;scroll-down = i3wm-wsprev

cursor-click = pointer
cursor-scroll = ns-resize

[module/tray]
type = internal/tray

;tray-background = ${bar-top-tray.background}
tray-padding = ${bar-top-tray.padding}
tray-size = ${bar-top-tray.size}
;format-background = ${block.bg}
;format-padding = ${block.pad}
;format-margin = 0
tray-spacing = ${bar-top-tray.spacing}
hidden = true



; vim:ft=dosini
