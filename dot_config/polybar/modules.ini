[module/wlan]
type = internal/network
interface = ${env:WIRELESS_NAME}
interval = 3.0

format-connected = <ramp-signal><label-connected>
; format-connected-prefix = " "
; format-connected = <label-connected>
format-connected-underline = ${module-network.wlan-underline}

# The text
label-connected = %essid% ↑%upspeed% ↓%downspeed%
label-font = 1
label-connected-background = ${module-network.label-bg}
label-connected-padding = ${spacing.none}

ramp-signal-font = 2
ramp-signal-0 = 
ramp-signal-1 = 
ramp-signal-2 = 
ramp-signal-3 = 
ramp-signal-4 = 
ramp-signal-5 = 
ramp-signal-padding = ${spacing.tight}
ramp-signal-foreground = ${module-network.ramp-fg}
; ramp-signal-background = ${colors.background-alt}

format-disconnected =
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-alt}

[module/eth]
type = internal/network
interface = ${env:ETH_NAME}
interval = 3.0

format-connected-underline = ${module-network.eth-underline}
format-connected-prefix = ""
format-connected-prefix-foreground = ${module-network.prefix-fg}
label-connected = %local_ip% ↑%upspeed% ↓%downspeed%

format-disconnected =
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-alt}

