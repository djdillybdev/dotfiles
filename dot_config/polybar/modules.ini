[module/xwindow]
type = internal/xwindow
format = <label>
format-prefix = 
format-prefix-font = ${module-prefix.font}
;format-prefix-padding = ${module-prefix.padding}
format-prefix-foreground = ${module-prefix.xwindow-fg}
format-background = ${block.bg}
format-foreground = ${block.fg}
;format-underline = ${ui.block-outline}
format-padding = ${block.pad}
format-margin = ${spacing.none}

label = %title:0:50:...%
label-padding = 1
label-empty = Desktop
label-empty-padding = 1

[module/filesystem]
type = internal/fs
interval = 25

;mount-0 = /

format-mounted = <label-mounted>
format-mounted-prefix = 
format-mounted-prefix-font = ${module-prefix.font}
;format-mounted-prefix-padding = ${module-prefix.padding}
format-mounted-prefix-foreground = ${module-prefix.filesystem-fg}
format-mounted-background = ${block.bg}
format-mounted-foreground = ${block.fg}
;format-mounted-underline = ${ui.block-outline}
format-mounted-padding = ${block.pad}
format-mounted-margin = ${spacing.none}

label-mounted = %free%
label-mounted-padding = 1
;label-unmounted = / n/a


[module/i3]
type = internal/i3

; Only show workspaces defined on the same output as the bar
;
; Useful if you want to show monitor specific workspaces
; on different bars
;
; Default: false
pin-workspaces = true

; Show urgent workspaces regardless of whether the workspace is actually hidden 
; by pin-workspaces.
;
; Default: false
; New in version 3.6.0
show-urgent = true

; This will split the workspace name on ':'
; Default: false
strip-wsnumbers = true

; Sort the workspaces by index instead of the default
; sorting that groups the workspaces by output
; Default: false
index-sort = true

; Create click handler used to focus workspace
; Default: true
enable-click = true

; Create scroll handlers used to cycle workspaces
; Default: true
enable-scroll = true

; Wrap around when reaching the first/last workspace
; Default: true
wrapping-scroll = true

; Set the scroll cycle direction 
; Default: true
reverse-scroll = false

; Use fuzzy (partial) matching for wc-icon.
; Example: code;♚ will apply the icon to all workspaces 
; containing 'code' in the name
; Changed in version 3.7.0: Selects longest string match instead of the first match.
; Default: false
fuzzy-match = true

; ws-icon-[0-9]+ = <label>;<icon>
; NOTE: The <label> needs to match the name of the i3 workspace
; Neither <label> nor <icon> can contain a semicolon (;)
ws-icon-0 = 1;♚
ws-icon-1 = 2;♛
ws-icon-2 = 3;♜
ws-icon-3 = 4;♝
ws-icon-4 = 5;♞
ws-icon-default = ♟
; NOTE: You cannot skip icons, e.g. to get a ws-icon-6
; you must also define a ws-icon-5.
; NOTE: Icon will be available as the %icon% token inside label-*

; Available tags:
;   <label-state> (default) - gets replaced with <label-(focused|unfocused|visible|urgent)>
;   <label-mode> (default)
format = <label-state> <label-mode>
format-background = ${i3block.bg}
format-foreground = ${i3block.fg}
format-padding = ${i3block.pad}
format-margin = ${spacing.none}

; Available tokens:
;   %mode%
; Default: %mode%
label-mode = %mode%
label-mode-padding = ${spacing.tight}
label-mode-background = ${i3block.bg}
label-mode-foreground = ${i3block.fg}
label-mode-underline = ${i3block.mode-underline}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-focused = %index%
label-focused-foreground = ${i3block.bg}
label-focused-underline = ${i3block.focused-underline}
label-focused-padding = 1
label-focused-background = ${i3block.focused-underline}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-unfocused = %index%
label-unfocused-foreground = ${i3block.fg}
label-unfocused-padding = ${spacing.none}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-visible = %index%
label-visible-foreground = ${i3block.fg}
label-visible-underline = ${i3block.visible-underline}
label-visible-padding = ${spacing.none}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-urgent = %index%
label-urgent-foreground = ${i3block.fg}
label-urgent-underline = ${i3block.urgent-underline}
label-urgent-padding = ${spacing.none}

; Separator in between workspaces
label-separator = |
label-separator-padding = ${spacing.tight}
label-separator-foreground = ${i3block.separator-fg}


[module/mpd]
type = internal/mpd
format-online = %{T3}<icon-prev> <icon-stop> <toggle> <icon-next> %{T1}<label-time> <bar-progress> %{T1}<label-song>
format-online-overline = ${module-mpd.format-line}
format-online-underline = ${module-mpd.format-line}
format-offline = <label-offline>
label-offline = mpd is off

icon-play = ⏵
icon-pause = ⏸
icon-stop = ⏹
icon-prev = ⏮
icon-next = ⏭
icon-seekb = 
icon-seekf = 
icon-random = 列
icon-repeat = 凌
icon-repeatone = 綾
icon-single = 綾
icon-consume = ✀

label-song-maxlen = 100
label-song-ellipsis = true

bar-progress-width = 20
bar-progress-format = %{+o +u}%fill%%{-o -u}%indicator%%{+o +u}%empty%%{-u -o}
; bar-progress-indicator = |
bar-progress-indicator = █
bar-progress-indicator-foreground = ${module-mpd.progress-indicator-fg}
bar-progress-indicator-font = 3
; bar-progress-fill = ─
bar-progress-fill = █
bar-progress-fill-foreground = ${module-mpd.progress-fill-fg}
bar-progress-fill-font = 3
; bar-progress-empty = ─
bar-progress-empty = ▒
bar-progress-empty-font = 3
bar-progress-empty-foreground = ${module-mpd.progress-empty-fg}

toggle-on-foreground = ${module-mpd.toggle-on-fg}
toggle-off-foreground = ${module-mpd.toggle-off-fg}




