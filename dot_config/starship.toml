"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""
palette = "catppuccin_active"
add_newline = false

[directory]
style = "fg:blue"
format = "[$path]($style) "

[character]
success_symbol = "[ ](bold fg:lavender)[❯](fg:mauve)"
error_symbol = "[ ](fg:peach)[❯](fg:red)"
vimcmd_symbol = "[ ](fg:lavender)[❮](fg:green)"
format = "$symbol "

[git_branch]
format = "[$branch]($style) "
style = "fg:mauve"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "fg:peach"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "fg:overlay1"

[cmd_duration]
format = "[$duration]($style) "
style = "fg:yellow"

[python]
format = "[$virtualenv]($style) "
style = "fg:overlay1"

[palettes.catppuccin_active]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
